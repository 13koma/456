services:
  grasp-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${LOCAL_USER:-dev}
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
    image: grasp-dev:humble
    container_name: grasp-dev
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    shm_size: "4gb"
    working_dir: /workspaces/grasp_jaka_ws
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-21}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
      JAKA_ROBOT_IP: ${JAKA_ROBOT_IP:-10.5.5.100}
      JAKA_ROBOT_MODEL: ${JAKA_ROBOT_MODEL:-zu12}
      GRIPPER_PORT: ${GRIPPER_PORT:-/dev/ttyUSB0}
      CAMERA_NAMESPACE: ${CAMERA_NAMESPACE:-/camera/camera}
      XAUTHORITY: /home/${LOCAL_USER:-dev}/.Xauthority
    volumes:
      - ./:/workspaces/grasp_jaka_ws:rw
      - grasp_build:/workspaces/grasp_jaka_ws/build
      - grasp_install:/workspaces/grasp_jaka_ws/install
      - grasp_log:/workspaces/grasp_jaka_ws/log
      - grasp_ros_home:/home/${LOCAL_USER:-dev}/.ros
      - grasp_pip_cache:/home/${LOCAL_USER:-dev}/.cache/pip
      - grasp_ccache:/home/${LOCAL_USER:-dev}/.ccache
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - ${HOME}/.Xauthority:/home/${LOCAL_USER:-dev}/.Xauthority:ro
    command: ./scripts/container_start.sh
    restart: unless-stopped

volumes:
  grasp_build:
  grasp_install:
  grasp_log:
  grasp_ros_home:
  grasp_pip_cache:
  grasp_ccache:
