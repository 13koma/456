base_frame: base_link

camera_mount_parent: Link_6
camera_mount_frame: camera_mount_link
camera_mount_xyz: [0.0, 0.0, 0.0]
camera_mount_rpy: [0.0, 0.0, 0.0]

camera_parent: Link_6
camera_frame: camera_link

# Замеры от фланца Link_6:
# Y_link6 смотрит вниз, Z_link6 смотрит вперёд (вдоль гриппера)
# camera_xyz: [X_link6, Y_link6, Z_link6]
# вбок=0, вниз=-0.07 (камера выше гриппера = против Y_link6), вперёд=+0.004
camera_xyz: [0.0, -0.07, 0.004]
# Y_link6 вниз, Y_camera вверх → поворот π вокруг X
camera_rpy: [1.5708, -1.5708, 0.0]

legacy_tcp_frame: jaka_tcp

# Пока не трогаем
tool0_xyz: [0.0, 0.0, 0.0]
tool0_rpy: [0.0, 0.0, 0.0]

# Приблизительный конец гриппера
# Z_link6 вперёд, гриппер ~150мм от фланца
gripper_tip_parent: Link_6
gripper_tip_frame: gripper_tip
gripper_tip_xyz: [0.0, 0.0, 0.15]
gripper_tip_rpy: [0.0, 0.0, 0.0]

joint_state_input_topic: /jaka_driver/joint_position
joint_state_output_topic: /joint_states
joint_state_frame_id: base_link
joint_state_stamp_now: true

robot_description_package: jaka_zu12_tf_tools
robot_description_file: urdf/jaka_zu12_with_camera.urdf.xacro
publish_frequency: 125.0